spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:h2:mem:paymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
payment:
  stub:
    fraud:
      decision: APPROVED
      score: 10
      reference: fraud_stub_ref
      failure-code: FRAUD_REJECTED
      failure-reason: Transaction rejected by stub fraud policy


    wallet:
      debit-success: true
      failure-code: INSUFFICIENT_BALANCE
      failure-reason: Insufficient balance

    ledger:
      record-success: false
      failure-code: LEDGER_WRITE_FAILED
      failure-reason: Ledger write failed

    event:
      publish-success: true

    merchant:
      verify-success: true
      failure-code: MERCHANT_NOT_FOUND
      failure-reason: Merchant verification failed
